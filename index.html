            const shellElement = settingSceneMountElement.querySelector(".setting-scene-shell");
            if (!shellElement || !settingSceneContract) {
                clearSettingScene();
                return;
            }

            const shellRect = shellElement.getBoundingClientRect();
            if (!shellRect.width || !shellRect.height) {
                clearSettingScene();
                return;
            }

            const { designWidth, designHeight } = getSettingSceneLayoutMetrics(settingSceneContract);
            const scaleX = shellRect.width / designWidth;
            const scaleY = shellRect.height / designHeight;
            const panelBounds = getSettingScenePanelBounds(settingSceneContract);
            const relativeX = event.clientX - shellRect.left;
            const relativeY = event.clientY - shellRect.top;
            const isInsidePanel =
                relativeX >= panelBounds.left * scaleX &&
                relativeX <= panelBounds.right * scaleX &&
                relativeY >= panelBounds.top * scaleY &&
                relativeY <= panelBounds.bottom * scaleY;

            if (isInsidePanel) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            clearSettingScene();
        });

        const SETTING_SCENE_CLOSE_ANIMATION_MS = 760;
        const MATCH_SPARKLE_MS = 240;
        const COLOR_COMPLETE_STEP_MS = 20;
        const FULL_BOARD_CELEBRATION_MAX_MS = 680;
        const FIREWORK_BURST_CLEANUP_MS = 1450;
        const STAGE_CLEAR_FIREWORK_SEQUENCE = [
            { left: 18, top: 22, delay: 0, accent: 0 },
            { left: 82, top: 20, delay: 120, accent: 1 },
            { left: 30, top: 42, delay: 220, accent: 2 },
            { left: 70, top: 40, delay: 340, accent: 1 },
            { left: 50, top: 24, delay: 460, accent: 3 },
            { left: 24, top: 30, delay: 620, accent: 2 },
            { left: 76, top: 28, delay: 760, accent: 4 },
            { left: 50, top: 34, delay: 900, accent: 3 }
        ];
        const STAGE_TRANSITION_DELAY_MS = Math.max(
            ...STAGE_CLEAR_FIREWORK_SEQUENCE.map(({ delay }) => delay)
        ) + FIREWORK_BURST_CLEANUP_MS;
        const DIAMOND_PARTICLE_PRESETS = [
            { dx: -18, dy: -16, size: 16, rotation: -24, delay: 0 },
            { dx: 20, dy: -14, size: 14, rotation: 18, delay: 30 },
            { dx: -14, dy: 18, size: 12, rotation: -12, delay: 54 },
            { dx: 16, dy: 20, size: 13, rotation: 26, delay: 76 },
            { dx: 0, dy: -24, size: 11, rotation: 10, delay: 92 },
            { dx: 0, dy: 24, size: 10, rotation: -18, delay: 112 }
        ];

        function syncActiveMap(nextMapIndex = 0) {
            currentMapIndex = ((nextMapIndex % MAP_DEFINITIONS.length) + MAP_DEFINITIONS.length) % MAP_DEFINITIONS.length;
            persistCurrentMapId(MAP_DEFINITIONS[currentMapIndex].id);
            applyMapTheme(MAP_DEFINITIONS[currentMapIndex].id);
            ACTIVE_MAP = buildMapConfig(MAP_DEFINITIONS[currentMapIndex]);
            TARGET_MAP = ACTIVE_MAP.targetMap;
            ROWS = ACTIVE_MAP.rows;
            COLS = ACTIVE_MAP.cols;
            TARGET_POSITIONS = ACTIVE_MAP.targetPositions;
            TARGET_COLOR_COUNTS = ACTIVE_MAP.targetColorCounts;
            INITIAL_LAYOUT_ORDER = ACTIVE_MAP.initialLayoutOrder;
            POCKET_UNLOCK_RULE = ACTIVE_MAP.pocketUnlock;
            DEFAULT_BOARD_CELL_SIZE = ACTIVE_MAP.boardCellSize ?? 36;
            DEFAULT_TRAY_CELL_SIZE = ACTIVE_MAP.trayCellSize ?? 40;
            INITIAL_LAYOUT_INDEX = new Map(
                INITIAL_LAYOUT_ORDER.map((position, index) => [`${position.row}-${position.col}`, index])
            );
            TARGET_NEIGHBOR_PAIRS = TARGET_POSITIONS.flatMap((position) => {
                const neighbors = [];
                [
                    { row: position.row + 1, col: position.col },
                    { row: position.row, col: position.col + 1 }
                ].forEach((neighbor) => {
                    if (!TARGET_MAP[neighbor.row]?.[neighbor.col]) return;
                    neighbors.push([
                        INITIAL_LAYOUT_INDEX.get(`${position.row}-${position.col}`),
                        INITIAL_LAYOUT_INDEX.get(`${neighbor.row}-${neighbor.col}`)
                    ]);
                });
                return neighbors;
            });
            TOTAL_TARGET_CELLS = ACTIVE_MAP.totalTargetCells;
            boardElement.style.gridTemplateColumns = `repeat(${COLS}, var(--board-cell-size))`;
            syncPixelAdminWithActiveMap();
        }

        function getCurrentMapDefinition() {
            return MAP_DEFINITIONS[currentMapIndex];
        }

        function getPixelAdminPaletteIds(mapId, sourceMap, paletteMeta = {}) {
            const colorIds = new Set(Object.keys(paletteMeta).map((colorId) => Number(colorId)));

            sourceMap.forEach((row) => {
                row.forEach((colorId) => {
                    if (colorId) colorIds.add(colorId);
                });
            });

            return [...colorIds].sort((left, right) => left - right);
        }

        function getPixelAdminBaseColorIds(mapId) {
            const definition = getMapDefinitionById(mapId);
            if (!definition) {
                return [];
            }

            const colorIds = new Set();
            buildStageCanvasMapFromBase(definition).forEach((row) => {
                row.forEach((colorId) => {
                    if (colorId) {
                        colorIds.add(colorId);
                    }
                });
            });

            return [...colorIds].sort((left, right) => left - right);
        }

        function canRemovePixelAdminColor(mapId, colorId) {
            if (colorId === 0) {
                return false;
            }

            return true;
        }

        function getPixelAdminColorHex(mapId, colorId, paletteMeta = null) {
            if (colorId === 0) {
                return "#FFFFFF";
            }

            return (
                normalizeHexColor(typeof paletteMeta?.[colorId] === "string" ? paletteMeta[colorId] : paletteMeta?.[colorId]?.color) ||
                MAP_THEME_OVERRIDES[mapId]?.palette?.[colorId] ||
                COLOR_PALETTE[colorId]?.color ||
                DEFAULT_COLOR_PALETTE[colorId]?.color ||
                "#FFFFFF"
            );
        }

        function getPixelAdminColorLabel(mapId, colorId, paletteMeta = null) {
            if (colorId === 0) {
                return "지우개";
            }

            return getDefaultPixelAdminColorLabel(mapId, colorId);
        }

        function getPixelAdminDefaultExportBaseName(mapId) {
            return mapId.toUpperCase();
        }

        function normalizePixelAdminExportBaseName(value) {
            return String(value || "")
                .toUpperCase()
                .replace(/[^A-Z0-9]+/g, "_")
                .replace(/^_+|_+$/g, "")
                .replace(/_+/g, "_")
                .slice(0, 48);
        }

        function getPixelAdminTitleFromExportBaseName(value) {
            const normalized = normalizePixelAdminExportBaseName(value)
                .replace(/^EDITABLE_/, "")
                .replace(/_(?:IMAGE_MAP|MATRIX|PALETTE)$/, "");
            return normalizeStageDisplayName(normalized.replace(/_/g, " "));
        }

        function getPixelAdminExportBaseName(mapId, displayName = "") {
            const normalizedFromTitle = normalizePixelAdminExportBaseName(displayName);
            if (normalizedFromTitle) {
                return normalizedFromTitle;
            }

            return getPixelAdminDefaultExportBaseName(mapId);
        }

        function getPixelAdminExportName(mapId, displayName = "") {
            if (mapId === "apple") {
                return "EDITABLE_APPLE_MATRIX";
            }

            return `${getPixelAdminExportBaseName(mapId, displayName)}_IMAGE_MAP`;
        }

        function getResolvedPixelAdminSelection(mapId, currentSelection, sourceMap, paletteMeta = {}) {
            const paletteIds = getPixelAdminPaletteIds(mapId, sourceMap, paletteMeta);
            if (paletteIds.includes(currentSelection)) {
                return currentSelection;
            }

            return paletteIds[0] ?? 0;
        }

        function serializePixelAdminMap(mapId, sourceMap, paletteMeta = {}, displayName = "") {
            if (!sourceMap.length) {
                return "";
            }

            const paletteIds = getPixelAdminPaletteIds(mapId, sourceMap, paletteMeta);
            const exportBaseName = getPixelAdminExportBaseName(mapId, displayName);
            const paletteRows = paletteIds
                .map((colorId) => {
                    const colorHex = getPixelAdminColorHex(mapId, colorId, paletteMeta);
                    return `    ${colorId}: "${escapeJsString(colorHex)}"`;
                })
                .join(",\n");

            const rows = sourceMap.map((row) => `    [${row.join(", ")}]`).join(",\n");
            const paletteBlock = paletteRows
                ? `const ${exportBaseName}_PALETTE = {\n${paletteRows}\n};\n\n`
                : "";
            return `${paletteBlock}const ${getPixelAdminExportName(mapId, displayName)} = [\n${rows}\n];`;
        }

        function extractPixelAdminExportBaseName(source, mapId) {
            const paletteNameMatch = source.match(/const\s+([A-Z0-9_]+)_PALETTE\s*=\s*\{/);
            const preferredMatrixName = getPixelAdminExportName(mapId);
            const matrixNameMatch =
                source.match(new RegExp(`const\\s+(${preferredMatrixName}|[A-Z0-9_]+)\\s*=\\s*\\[`)) ||
                source.match(/const\s+([A-Z0-9_]+)\s*=\s*\[/);
            const rawName = matrixNameMatch?.[1] || paletteNameMatch?.[1] || "";
            return normalizePixelAdminExportBaseName(rawName)
                .replace(/^EDITABLE_/, "")
                .replace(/_(?:IMAGE_MAP|MATRIX|PALETTE)$/, "");
        }

        function parsePixelAdminPaletteBlock(block) {
            const palette = {};
            const entryMatches = [...block.matchAll(/(\d+)\s*:\s*["']([^"']+)["']/g)];

            if (!entryMatches.length && block.trim()) {
                throw new Error("팔레트 코드 형식을 이해하지 못했어요.");
            }

            entryMatches.forEach((match) => {
                const colorId = Number(match[1]);
                const normalized = normalizeHexColor(match[2]);
                if (!normalized) {
                    throw new Error(`C${colorId} 색상은 6자리 HEX여야 해요.`);
                }
                palette[colorId] = { color: normalized };
            });

            return palette;
        }

        function parsePixelAdminMatrixBlock(block) {
            const rowMatches = [...block.matchAll(/\[([^\[\]]*?)\]/g)];

            if (!rowMatches.length) {
                throw new Error("매트릭스 행을 찾지 못했어요.");
            }

            const rows = rowMatches.map((match) => {
                const row = match[1]
                    .split(",")
                    .map((value) => value.trim())
                    .filter(Boolean)
                    .map((value) => {
                        if (!/^-?\d+$/.test(value)) {
                            throw new Error(`숫자가 아닌 셀이 있어요: ${value}`);
                        }
                        return Number(value);
                    });

                if (!row.length) {
                    throw new Error("비어 있는 행이 있어요.");
                }

                return row;
            });

            const columnCount = rows[0].length;
            if (rows.some((row) => row.length !== columnCount)) {
                throw new Error("모든 행의 칸 수가 같아야 해요.");
            }

            if (rows.length > MAX_GRID_ROWS || columnCount > MAX_GRID_COLS) {
                throw new Error(`매트릭스가 너무 커요. 최대 ${MAX_GRID_ROWS}x${MAX_GRID_COLS}까지 가능해요.`);
            }

            return rows;
        }

        function parsePixelAdminExport(text, mapId) {
            const source = String(text || "").trim();
            if (!source) {
                throw new Error("코드 창이 비어 있어요.");
            }

            const paletteMatch = source.match(/const\s+[A-Z0-9_]+_PALETTE\s*=\s*\{([\s\S]*?)\};/);
            const matrixName = getPixelAdminExportName(mapId);
            const matrixMatch =
                source.match(new RegExp(`const\\s+${matrixName}\\s*=\\s*\\[([\\s\\S]*?)\\];`)) ||
                source.match(/const\s+[A-Z0-9_]+\s*=\s*\[([\s\S]*?)\];/);

            if (!matrixMatch) {
                throw new Error("매트릭스 const 블록을 찾지 못했어요.");
            }

            const draftPalette = paletteMatch ? parsePixelAdminPaletteBlock(paletteMatch[1]) : {};
            const draftMap = parsePixelAdminMatrixBlock(matrixMatch[1]);
            const exportBaseName = extractPixelAdminExportBaseName(source, mapId);

            return {
                draftPalette,
                draftMap,
                draftDisplayName: getPixelAdminTitleFromExportBaseName(exportBaseName)
            };
        }

        function syncPixelAdminDraftFromExportInput() {
            if (!pixelAdminExportElement || !pixelAdminState.exportIsDirty) {
                return true;
            }

            const parsed = parsePixelAdminExport(pixelAdminExportElement.value, pixelAdminState.currentMapId);
            pixelAdminState.draftMap = clonePixelMap(parsed.draftMap);
            pixelAdminState.draftPalette = clonePaletteMeta(parsed.draftPalette);
            if (parsed.draftDisplayName) {
                pixelAdminState.draftDisplayName = parsed.draftDisplayName;
            }
            pixelAdminState.selectedColorId = getResolvedPixelAdminSelection(
                pixelAdminState.currentMapId,
                pixelAdminState.selectedColorId,
                pixelAdminState.draftMap,
                pixelAdminState.draftPalette
            );
            pixelAdminState.isDirty = true;
            pixelAdminState.exportIsDirty = false;
            return true;
        }

        function getSuggestedPixelAdminHex(nextColorId) {
            const presets = ["#E58585", "#E4C681", "#40B697", "#66A8DE", "#B9A7EC", "#E793B0", "#DFA86D", "#8ABDE6"];
            return normalizeHexColor(presets[(nextColorId - 1) % presets.length]) || "#CCCCCC";
        }

        function getNextPixelAdminColorId(sourceMap, paletteMeta = {}) {
            const colorIds = getPixelAdminPaletteIds("", sourceMap, paletteMeta);
            return (colorIds[colorIds.length - 1] || 0) + 1;
        }

        function updateSelectedPixelAdminColorDraft(patch) {
            if (pixelAdminState.selectedColorId === 0) {
                return;
            }

            const colorId = pixelAdminState.selectedColorId;
            const currentColor = pixelAdminState.draftPalette[colorId] || {
                color: getSuggestedPixelAdminHex(colorId)
            };
            const nextColor =
                patch.color !== undefined
                    ? normalizeHexColor(patch.color) || currentColor.color
                    : currentColor.color;

            pixelAdminState.draftPalette[colorId] = {
                color: nextColor
            };
            pixelAdminState.isDirty = true;
            pixelAdminState.message = `${getDefaultPixelAdminColorLabel(pixelAdminState.currentMapId, colorId)} 색상을 수정했어요.`;
            schedulePixelAdminAutoSave();
            renderPixelAdmin();
        }

        function updatePixelAdminStageTitleDraft(nextValue) {
            const definition = getMapDefinitionById(pixelAdminState.currentMapId);
            if (!definition) {
                return;
            }

            pixelAdminState.draftDisplayName = String(nextValue || "").slice(0, 24);
            pixelAdminState.isDirty = true;
            pixelAdminState.message = "스테이지 제목을 수정했어요. 잠시 후 자동 저장됩니다.";
            schedulePixelAdminAutoSave(700);
            renderPixelAdmin();
        }

        function addPixelAdminColor() {
            const nextColorId = getNextPixelAdminColorId(pixelAdminState.draftMap || [], pixelAdminState.draftPalette);
            pixelAdminState.draftPalette[nextColorId] = {
                color: getSuggestedPixelAdminHex(nextColorId)
            };
            pixelAdminState.selectedColorId = nextColorId;
            pixelAdminState.isDirty = true;
            pixelAdminState.message = `C${nextColorId} 색상을 팔레트에 추가했어요.`;
            schedulePixelAdminAutoSave();
            renderPixelAdmin();
        }

        function removePixelAdminColor(colorId) {
            const mapId = pixelAdminState.currentMapId;
            if (!pixelAdminState.draftMap || !canRemovePixelAdminColor(mapId, colorId)) {
                return;
            }

            let erasedCellCount = 0;
            pixelAdminState.draftMap = pixelAdminState.draftMap.map((row) =>
                row.map((cellColorId) => {
                    if (cellColorId !== colorId) {
                        return cellColorId;
                    }

                    erasedCellCount += 1;
                    return 0;
                })
            );
            delete pixelAdminState.draftPalette[colorId];
            pixelAdminState.selectedColorId = getResolvedPixelAdminSelection(
                mapId,
                pixelAdminState.selectedColorId === colorId ? 0 : pixelAdminState.selectedColorId,
                pixelAdminState.draftMap,
                pixelAdminState.draftPalette
            );
            pixelAdminState.isDirty = true;
            pixelAdminState.message = erasedCellCount
                ? `C${colorId} 색상을 삭제하고 ${erasedCellCount}개 셀을 비웠어요.`
                : `C${colorId} 색상을 팔레트에서 삭제했어요.`;
            schedulePixelAdminAutoSave();
            renderPixelAdmin();
        }

        function syncPixelAdminWithActiveMap(force = false) {
            if (!pixelAdminElement) {
                return;
            }

            clearPixelAdminAutoSaveTimer();

            const definition = getCurrentMapDefinition();
            if (!definition) {
                return;
            }

            if (!force && pixelAdminState.currentMapId === definition.id && pixelAdminState.draftMap) {
                return;
            }

            pixelAdminState.currentMapId = definition.id;
            pixelAdminState.draftMap = getStageEditorCanvasMap(definition);
            pixelAdminState.draftPalette = clonePaletteMeta(getStagePaletteMeta(definition, pixelAdminState.draftMap));
            pixelAdminState.draftDisplayName = getStageResolvedDisplayName(definition);
            pixelAdminState.canvasZoom = 1;
            pixelAdminState.canvasMetrics = null;
            pixelAdminState.selectedColorId = getResolvedPixelAdminSelection(
                definition.id,
                pixelAdminState.selectedColorId,
                pixelAdminState.draftMap,
                pixelAdminState.draftPalette
            );
            pixelAdminState.isDirty = false;
            pixelAdminState.exportIsDirty = false;
            pixelAdminState.message = "`Shift + A`로 어드민을 열고 닫을 수 있습니다.";
            renderPixelAdmin();
        }

        function setPixelAdminOpen(nextOpen) {
            pixelAdminState.isOpen = nextOpen;
            if (nextOpen) {
                syncPixelAdminWithActiveMap();
            }
            renderPixelAdmin();
        }

        function isCompactPixelAdminLayout() {
            return window.matchMedia("(max-width: 540px)").matches;
        }

        function getPixelAdminWidthRange() {
            const minWidth = 340;
            const maxWidth = Math.max(minWidth, window.innerWidth - 24);
            return { minWidth, maxWidth };
        }

        function applyPixelAdminPanelWidth() {
            if (!pixelAdminElement) {
                return;
            }

            if (isCompactPixelAdminLayout()) {
                pixelAdminElement.style.removeProperty("--pixel-admin-width");
                pixelAdminElement.classList.toggle("resizing", false);
                return;
            }

            const { minWidth, maxWidth } = getPixelAdminWidthRange();
            const fallbackWidth = Math.min(390, maxWidth);
            const resolvedWidth = Math.max(
                minWidth,
                Math.min(maxWidth, pixelAdminState.panelWidth ?? fallbackWidth)
            );

            pixelAdminState.panelWidth = resolvedWidth;
            pixelAdminElement.style.setProperty("--pixel-admin-width", `${resolvedWidth}px`);
            pixelAdminElement.classList.toggle("resizing", pixelAdminResize.isActive);
        }

        function startPixelAdminResize(event) {
            if (!pixelAdminElement || isCompactPixelAdminLayout()) {
                return;
            }

            event.preventDefault();
            pixelAdminResize.isActive = true;
            pixelAdminResize.startX = event.clientX;
            pixelAdminResize.startWidth = pixelAdminElement.getBoundingClientRect().width;
            pixelAdminElement.classList.add("resizing");
        }

        function updatePixelAdminResize(event) {
            if (!pixelAdminResize.isActive) {
                return;
            }

            const dragOffset = pixelAdminResize.startX - event.clientX;
            pixelAdminState.panelWidth = pixelAdminResize.startWidth + dragOffset;
            applyPixelAdminPanelWidth();
            if (pixelAdminState.isOpen && pixelAdminState.draftMap?.[0]?.length) {
                syncPixelAdminGridMetrics(pixelAdminState.draftMap[0].length, pixelAdminState.draftMap.length);
            }
        }

        function stopPixelAdminResize(event) {
            if (!pixelAdminResize.isActive) {
                return;
            }

            pixelAdminResize.isActive = false;
            pixelAdminElement?.classList.remove("resizing");
            applyPixelAdminPanelWidth();
        }

        function syncPixelAdminGridMetrics(columnCount, rowCount = pixelAdminState.draftMap?.length || 0) {
            if (!pixelAdminGridElement || !pixelAdminGridWrapElement || !columnCount || !rowCount) {
                return null;
            }

            const wrapStyles = window.getComputedStyle(pixelAdminGridWrapElement);
            const horizontalPadding =
                Number.parseFloat(wrapStyles.paddingLeft || "0") +
                Number.parseFloat(wrapStyles.paddingRight || "0");
            const paddingLeft = Number.parseFloat(wrapStyles.paddingLeft || "0");
            const paddingTop = Number.parseFloat(wrapStyles.paddingTop || "0");
            const availableWidth = Math.max(0, pixelAdminGridWrapElement.clientWidth - horizontalPadding);
            const gap = 1;
            const gridChrome = 4;
            const gridInset = 2;
            const baseCellSize = Math.max(2, (availableWidth - gridChrome - gap * (columnCount - 1)) / columnCount);
            const effectiveZoom = pixelAdminState.canvasZoom || 1;
            const cellSize = Math.max(2, baseCellSize * effectiveZoom);
            const contentWidth = columnCount * cellSize + gap * (columnCount - 1);
            const contentHeight = rowCount * cellSize + gap * (rowCount - 1);
            const gridWidth = contentWidth + gridChrome;
            const gridHeight = contentHeight + gridChrome;
            const centeredOffsetX = Math.max(0, (availableWidth - gridWidth) / 2);
            const axisOffsetX = paddingLeft + centeredOffsetX + gridInset;
            const axisOffsetY = paddingTop + gridInset;

            pixelAdminGridElement.style.setProperty("--pixel-admin-cols", columnCount);
            pixelAdminGridElement.style.setProperty("--pixel-admin-rows", rowCount);
            pixelAdminGridElement.style.setProperty("--pixel-admin-cell-size", `${cellSize}px`);
            pixelAdminGridElement.style.width = `${gridWidth}px`;
            pixelAdminGridElement.style.height = `${gridHeight}px`;

            [
                pixelAdminAxisTopElement,
                pixelAdminAxisBottomElement,
                pixelAdminAxisLeftElement,
                pixelAdminAxisRightElement
            ].forEach((axisElement) => {
                if (!axisElement) return;
                axisElement.style.setProperty("--pixel-admin-cols", columnCount);
                axisElement.style.setProperty("--pixel-admin-rows", rowCount);
                axisElement.style.setProperty("--pixel-admin-cell-size", `${cellSize}px`);
            });

            if (pixelAdminAxisTopElement) pixelAdminAxisTopElement.style.width = `${contentWidth}px`;
            if (pixelAdminAxisBottomElement) pixelAdminAxisBottomElement.style.width = `${contentWidth}px`;
            if (pixelAdminAxisLeftElement) pixelAdminAxisLeftElement.style.height = `${contentHeight}px`;
            if (pixelAdminAxisRightElement) pixelAdminAxisRightElement.style.height = `${contentHeight}px`;

            pixelAdminState.canvasMetrics = {
                baseCellSize,
                cellSize,
                gridWidth,
                gridHeight,
                contentWidth,
                contentHeight,
                axisOffsetX,
                axisOffsetY
            };
            syncPixelAdminAxisScroll();
            return pixelAdminState.canvasMetrics;
        }

        function renderPixelAdminAxes(rowCount, columnCount) {
            if (
                !pixelAdminAxisTopElement ||
                !pixelAdminAxisBottomElement ||
                !pixelAdminAxisLeftElement ||
                !pixelAdminAxisRightElement
            ) {
                return;
            }

            const buildCells = (count) =>
                Array.from({ length: count }, (_, index) => `<span class="pixel-admin-axis-cell">${index + 1}</span>`).join("");

            const horizontalMarkup = buildCells(columnCount);
            const verticalMarkup = buildCells(rowCount);

            pixelAdminAxisTopElement.innerHTML = horizontalMarkup;
            pixelAdminAxisBottomElement.innerHTML = horizontalMarkup;
            pixelAdminAxisLeftElement.innerHTML = verticalMarkup;
            pixelAdminAxisRightElement.innerHTML = verticalMarkup;
            syncPixelAdminAxisScroll();
        }

        function syncPixelAdminAxisScroll() {
            if (!pixelAdminGridWrapElement) {
                return;
            }

            const canvasMetrics = pixelAdminState.canvasMetrics;
            const offsetX = (canvasMetrics?.axisOffsetX || 0) - pixelAdminGridWrapElement.scrollLeft;
            const offsetY = (canvasMetrics?.axisOffsetY || 0) - pixelAdminGridWrapElement.scrollTop;

            if (pixelAdminAxisTopElement) {
                pixelAdminAxisTopElement.style.transform = `translateX(${offsetX}px)`;
            }
            if (pixelAdminAxisBottomElement) {
                pixelAdminAxisBottomElement.style.transform = `translateX(${offsetX}px)`;
            }
            if (pixelAdminAxisLeftElement) {
                pixelAdminAxisLeftElement.style.transform = `translateY(${offsetY}px)`;
            }
            if (pixelAdminAxisRightElement) {
                pixelAdminAxisRightElement.style.transform = `translateY(${offsetY}px)`;
            }
        }

        function getPixelAdminWheelZoomIntent(event) {
            if (event.ctrlKey) {
                return true;
            }

            return Math.abs(event.deltaY) >= 30;
        }

        function setPixelAdminCanvasZoom(nextZoom, options = {}) {
            if (!pixelAdminGridWrapElement || !pixelAdminState.draftMap?.[0]?.length) {
                return;
            }

            const { anchorClientX = null, anchorClientY = null } = options;
            const previousMetrics = syncPixelAdminGridMetrics(
                pixelAdminState.draftMap[0].length,
                pixelAdminState.draftMap.length
            );
            const wrapRect = pixelAdminGridWrapElement.getBoundingClientRect();
            const anchorX = anchorClientX == null ? wrapRect.left + wrapRect.width / 2 : anchorClientX;
            const anchorY = anchorClientY == null ? wrapRect.top + wrapRect.height / 2 : anchorClientY;
            const localX = anchorX - wrapRect.left;
            const localY = anchorY - wrapRect.top;
            const previousGridWidth = previousMetrics?.gridWidth || pixelAdminGridElement.scrollWidth || 1;
            const previousGridHeight = previousMetrics?.gridHeight || pixelAdminGridElement.scrollHeight || 1;
            const anchorRatioX = (pixelAdminGridWrapElement.scrollLeft + localX) / previousGridWidth;
            const anchorRatioY = (pixelAdminGridWrapElement.scrollTop + localY) / previousGridHeight;

            pixelAdminState.canvasZoom = Math.max(1, Math.min(6, nextZoom));
            const nextMetrics = syncPixelAdminGridMetrics(
                pixelAdminState.draftMap[0].length,
                pixelAdminState.draftMap.length
            );

            if (!nextMetrics) {
                return;
            }

            pixelAdminGridWrapElement.scrollLeft = Math.max(0, anchorRatioX * nextMetrics.gridWidth - localX);
            pixelAdminGridWrapElement.scrollTop = Math.max(0, anchorRatioY * nextMetrics.gridHeight - localY);
        }

        function zoomPixelAdminCanvasByWheel(event) {
            if (!getPixelAdminWheelZoomIntent(event)) {
                return;
            }

            event.preventDefault();
            const zoomDelta = event.ctrlKey ? event.deltaY * 0.0025 : event.deltaY * 0.0016;
            const scaleFactor = Math.exp(-zoomDelta);
            setPixelAdminCanvasZoom((pixelAdminState.canvasZoom || 1) * scaleFactor, {
                anchorClientX: event.clientX,
                anchorClientY: event.clientY
            });
        }

        function togglePixelAdmin() {
            setPixelAdminOpen(!pixelAdminState.isOpen);
        }

        function clearPixelAdminToggleHoldTimer() {
            if (!pixelAdminToggleHoldTimer) {
                return;
            }

            window.clearTimeout(pixelAdminToggleHoldTimer);
            pixelAdminToggleHoldTimer = null;
        }

        function startPixelAdminToggleHold(event) {
            if (event.button != null && event.button !== 0) {
                return;
            }

            suppressPixelAdminToggleClick = false;
            clearPixelAdminToggleHoldTimer();
            pixelAdminToggleHoldTimer = window.setTimeout(() => {
                pixelAdminToggleHoldTimer = null;
                suppressPixelAdminToggleClick = true;
                goToFirstPlayableLevelCheat();
            }, PIXEL_ADMIN_CHEAT_HOLD_MS);
        }

        function cancelPixelAdminToggleHold() {
            clearPixelAdminToggleHoldTimer();
        }

        function paintPixelAdminCell(rowIndex, colIndex, colorId) {
            return paintPixelAdminCellWithOptions(rowIndex, colIndex, colorId);
        }

        function setPixelAdminCellPresentation(cell, rowIndex, colIndex, colorId, mapId, paletteMeta = {}) {
            const colorHex = getPixelAdminColorHex(mapId, colorId, paletteMeta);

            cell.dataset.row = String(rowIndex);
            cell.dataset.col = String(colIndex);
            cell.classList.toggle("empty", colorId === 0);
            if (colorId === 0) {
                cell.style.removeProperty("--cell-color");
            } else {
                cell.style.setProperty("--cell-color", colorHex);
            }
            cell.setAttribute(
                "aria-label",
                `${rowIndex + 1}행 ${colIndex + 1}열 ${getPixelAdminColorLabel(mapId, colorId, paletteMeta)} 픽셀`
            );
            cell.title = `${rowIndex + 1}, ${colIndex + 1} - ${getPixelAdminColorLabel(mapId, colorId, paletteMeta)}`;
        }

        function paintPixelAdminCellWithOptions(rowIndex, colIndex, colorId, options = {}) {
            const {
                cellElement = null,
                render = true,
                updateMessage = true
            } = options;

            if (!pixelAdminState.draftMap?.[rowIndex]) {
                return false;
            }

            if (pixelAdminState.draftMap[rowIndex][colIndex] === colorId) {
                return false;
            }

            pixelAdminState.draftMap[rowIndex][colIndex] = colorId;
            pixelAdminState.isDirty = true;
            const nextMessage = `${rowIndex + 1}행 ${colIndex + 1}열을 ${getPixelAdminColorLabel(
                pixelAdminState.currentMapId,
                colorId,
                pixelAdminState.draftPalette
            )}로 칠했어요.`;
            schedulePixelAdminAutoSave();
            if (updateMessage) {
                pixelAdminState.message = nextMessage;
            } else {
                pixelAdminInteraction.pendingMessage = nextMessage;
            }

            if (cellElement) {
                setPixelAdminCellPresentation(
                    cellElement,
                    rowIndex,
                    colIndex,
                    colorId,
                    pixelAdminState.currentMapId,
                    pixelAdminState.draftPalette
                );
            }

            if (render) {
                renderPixelAdmin();
            }

            return true;
        }

        function startPixelAdminDrawing(colorId) {
            pixelAdminInteraction.isDrawing = true;
            pixelAdminInteraction.drawColorId = colorId;
            pixelAdminInteraction.lastPaintedCellKey = null;
            pixelAdminInteraction.pendingMessage = "";
            pixelAdminInteraction.didPaint = false;
        }

        function stopPixelAdminDrawing() {
            if (!pixelAdminInteraction.isDrawing) {
                return;
            }

            pixelAdminInteraction.isDrawing = false;
            pixelAdminInteraction.drawColorId = null;
            pixelAdminInteraction.lastPaintedCellKey = null;

            if (pixelAdminInteraction.pendingMessage) {
                pixelAdminState.message = pixelAdminInteraction.pendingMessage;
            }

            const shouldRender = pixelAdminInteraction.didPaint;
            pixelAdminInteraction.pendingMessage = "";
            pixelAdminInteraction.didPaint = false;

            if (shouldRender) {
                renderPixelAdmin();
            }
        }

        function paintPixelAdminCellFromElement(cellElement, colorId) {
            if (!cellElement) {
                return;
            }

            const rowIndex = Number(cellElement.dataset.row);
            const colIndex = Number(cellElement.dataset.col);
            const cellKey = `${rowIndex}-${colIndex}`;

            if (pixelAdminInteraction.lastPaintedCellKey === cellKey) {
                return;
            }

            const changed = paintPixelAdminCellWithOptions(rowIndex, colIndex, colorId, {
                cellElement,
                render: false,
                updateMessage: false
            });

            pixelAdminInteraction.lastPaintedCellKey = cellKey;
            if (changed) {
                pixelAdminInteraction.didPaint = true;
            }
        }

            pixelAdminState.message = didPersist
                ? "이 스테이지에 캔버스와 팔레트 변경사항을 적용하고 저장했어요."
                : "이 스테이지에 캔버스와 팔레트 변경사항을 적용했지만 저장에는 실패했어요.";

        async function copyPixelAdminExport() {

                await navigator.clipboard.writeText(pixelAdminExportElement.value);

                swatch.addEventListener("click", () => {

                    cell.addEventListener("mouseenter", (event) => {

        function shuffle(list) {
            const copy = [...list];
            for (let i = copy.length - 1; i > 0; i -= 1) {
                const randomIndex = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[randomIndex]] = [copy[randomIndex], copy[i]];
            }
            return copy;
        }

        function getCellDistance(from, to) {
            return Math.abs(from.row - to.row) + Math.abs(from.col - to.col);
        }

        function getInitialClusterLimit() {
            return INITIAL_MAX_CLUSTER_SIZE;
        }

        function getInitialLayoutOffsets() {
            const sourceColors = INITIAL_LAYOUT_ORDER.map((position) => TARGET_MAP[position.row][position.col]);
            const scoredOffsets = [];

            for (let offset = 1; offset < sourceColors.length; offset += 1) {
                const shiftedColors = sourceColors.map((_, index) => sourceColors[(index + offset) % sourceColors.length]);

                const isValidOffset = shiftedColors.every((color, index) => {
                    const position = INITIAL_LAYOUT_ORDER[index];
                    return color !== TARGET_MAP[position.row][position.col];
                });

                if (!isValidOffset) continue;

                const adjacencyScore =
                    TARGET_NEIGHBOR_PAIRS.reduce(
                        (sameNeighbors, [leftIndex, rightIndex]) =>
                            sameNeighbors + (shiftedColors[leftIndex] === shiftedColors[rightIndex] ? 1 : 0),
                        0
                    ) / TARGET_NEIGHBOR_PAIRS.length;

                scoredOffsets.push({ offset, adjacencyScore });
            }

            if (!scoredOffsets.length) {
                return [Math.floor(sourceColors.length / 2)];
            }

            return scoredOffsets
                .sort(
                    (left, right) =>
                        left.adjacencyScore - right.adjacencyScore ||
                        Math.abs(left.offset - sourceColors.length / 2) - Math.abs(right.offset - sourceColors.length / 2)
                )
                .slice(0, 8)
                .map(({ offset }) => offset);
        }

        const INITIAL_LAYOUT_OFFSETS = getInitialLayoutOffsets();

        function softenInitialClusters(board) {
            let swaps = 0;
            let attempts = 0;

            while (swaps < 12 && attempts < TOTAL_TARGET_CELLS * 3) {
                attempts += 1;
                const source = TARGET_POSITIONS[Math.floor(Math.random() * TARGET_POSITIONS.length)];
                const target = TARGET_POSITIONS[Math.floor(Math.random() * TARGET_POSITIONS.length)];

                if (source.row === target.row && source.col === target.col) continue;

                const sourceColor = board[source.row][source.col];
                const targetColor = board[target.row][target.col];

                if (
                    sourceColor === targetColor ||
                    sourceColor === TARGET_MAP[target.row][target.col] ||
                    targetColor === TARGET_MAP[source.row][source.col]
                ) {
                    continue;
                }

                [board[source.row][source.col], board[target.row][target.col]] = [
                    targetColor,
                    sourceColor
                ];
                swaps += 1;
            }
        }

        function getBoardColorClusters(board) {
            const visited = new Set();
            const clusters = [];

            TARGET_POSITIONS.forEach((position) => {
                const startKey = toCellKey(position.row, position.col);
                if (visited.has(startKey)) return;

                const colorId = board[position.row][position.col];
                const stack = [position];
                const cells = [];
                visited.add(startKey);

                while (stack.length) {
                    const current = stack.pop();
                    cells.push(current);

                    EIGHT_WAY_DIRECTIONS.forEach((direction) => {
                        const nextRow = current.row + direction.row;
                        const nextCol = current.col + direction.col;
                        const nextKey = toCellKey(nextRow, nextCol);

                        if (
                            nextRow < 0 ||
                            nextRow >= ROWS ||
                            nextCol < 0 ||
                            nextCol >= COLS ||
                            !TARGET_MAP[nextRow][nextCol] ||
                            visited.has(nextKey) ||
                            board[nextRow][nextCol] !== colorId
                        ) {
                            return;
                        }

                        visited.add(nextKey);
                        stack.push({ row: nextRow, col: nextCol });
                    });
                }

                clusters.push({ colorId, cells, size: cells.length });
            });

            return clusters;
        }

        function getBoardAdjacencyScore(board) {
            let sameNeighbors = 0;

            TARGET_NEIGHBOR_PAIRS.forEach(([leftIndex, rightIndex]) => {
                const left = INITIAL_LAYOUT_ORDER[leftIndex];
                const right = INITIAL_LAYOUT_ORDER[rightIndex];
                if (board[left.row][left.col] === board[right.row][right.col]) {
                    sameNeighbors += 1;
                }
            });

            return sameNeighbors / TARGET_NEIGHBOR_PAIRS.length;
        }

        function getBoardClusterStats(board) {
            const clusterLimit = getInitialClusterLimit();
            const clusters = getBoardColorClusters(board);
            const oversizedClusters = clusters.filter(({ size }) => size > clusterLimit);

            return {
                clusters,
                oversizedClusters,
                maxClusterSize: clusters.reduce((maxSize, cluster) => Math.max(maxSize, cluster.size), 0),
                oversizeCellCount: oversizedClusters.reduce(
                    (count, cluster) => count + (cluster.size - clusterLimit),
                    0
                ),
                adjacencyScore: getBoardAdjacencyScore(board)
            };
        }

        function prepareInitialBoardCandidate(board) {
            if (!board?.length) {
                return board;
            }

            removeMatchedInitialCells(board);
            softenInitialClusters(board);
            breakLargeInitialClusters(board);
            removeMatchedInitialCells(board);
            return board;
        }

        function getInitialBoardQuality(board) {
            const clusterStats = getBoardClusterStats(board);
            return {
                matchedCount: countCorrectCellsInBoard(board),
                maxClusterSize: clusterStats.maxClusterSize,
                oversizeCellCount: clusterStats.oversizeCellCount,
                adjacencyScore: clusterStats.adjacencyScore
            };
        }

        function isBetterInitialBoardQuality(candidate, currentBest) {
            if (!currentBest) {
                return true;
            }

            return (
                candidate.matchedCount < currentBest.matchedCount ||
                (candidate.matchedCount === currentBest.matchedCount &&
                    candidate.oversizeCellCount < currentBest.oversizeCellCount) ||
                (candidate.matchedCount === currentBest.matchedCount &&
                    candidate.oversizeCellCount === currentBest.oversizeCellCount &&
                    candidate.maxClusterSize < currentBest.maxClusterSize) ||
                (candidate.matchedCount === currentBest.matchedCount &&
                    candidate.oversizeCellCount === currentBest.oversizeCellCount &&
                    candidate.maxClusterSize === currentBest.maxClusterSize &&
                    candidate.adjacencyScore < currentBest.adjacencyScore)
            );
        }

        function breakLargeInitialClusters(board) {
            for (let pass = 0; pass < TOTAL_TARGET_CELLS; pass += 1) {
                const currentStats = getBoardClusterStats(board);
                if (!currentStats.oversizedClusters.length) return;

                const oversizedCluster = [...currentStats.oversizedClusters].sort((left, right) => right.size - left.size)[0];
                const clusterCenter = oversizedCluster.cells.reduce(
                    (center, cell) => ({
                        row: center.row + cell.row / oversizedCluster.cells.length,
                        col: center.col + cell.col / oversizedCluster.cells.length
                    }),
                    { row: 0, col: 0 }
                );
                const clusterCellKeys = new Set(
                    oversizedCluster.cells.map((cell) => toCellKey(cell.row, cell.col))
                );
                const sourceCells = [...oversizedCluster.cells].sort(
                    (left, right) => getCellDistance(right, clusterCenter) - getCellDistance(left, clusterCenter)
                );
                const candidateCells = shuffle(TARGET_POSITIONS).filter((position) => {
                    const key = toCellKey(position.row, position.col);
                    return (
                        !clusterCellKeys.has(key) &&
                        board[position.row][position.col] !== oversizedCluster.colorId
                    );
                });

                let bestSwap = null;

                sourceCells.slice(0, 16).forEach((source) => {
                    candidateCells.slice(0, 64).forEach((candidate) => {
                        const sourceColor = board[source.row][source.col];
                        const candidateColor = board[candidate.row][candidate.col];

                        if (
                            sourceColor === TARGET_MAP[candidate.row][candidate.col] ||

            if (jewelImageCache.has(colorId)) return jewelImageCache.get(colorId);
            if (!jewelTemplateReady) return JEWEL_TEMPLATE_SRC;

            const canvas = document.createElement("canvas");
            canvas.width = jewelTemplateImage.width;
            canvas.height = jewelTemplateImage.height;
            const context = canvas.getContext("2d", { willReadFrequently: true });
            context.drawImage(jewelTemplateImage, 0, 0);

            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;
            const base = hexToRgb(COLOR_PALETTE[colorId].color);
            const light = tintRgb(base, 46);
            const deep = tintRgb(base, -46);
            const shadow = tintRgb(base, -92);
            const highlight = tintRgb(base, 72);

            for (let index = 0; index < pixels.length; index += 4) {
                const alpha = pixels[index + 3];
                if (alpha === 0) continue;

                const tone = pixels[index] / 255;
                const tinted = sampleGemTone(tone, base, light, deep, shadow, highlight);
                pixels[index] = tinted.r;
                pixels[index + 1] = tinted.g;
                pixels[index + 2] = tinted.b;
            }

            context.putImageData(imageData, 0, 0);
            const src = canvas.toDataURL("image/png");
            jewelImageCache.set(colorId, src);
            return src;
        }

        function getConnectedGemCluster(startRow, startCol) {
            const colorId = boardState[startRow][startCol];
            if (!colorId || isLockedCorrectGem(startRow, startCol)) return [];

            const visited = new Set();
            const cluster = [];
            const queue = [{ row: startRow, col: startCol }];
            let queueIndex = 0;
            visited.add(`${startRow}-${startCol}`);

            while (queueIndex < queue.length) {
                const current = queue[queueIndex];
                queueIndex += 1;
                cluster.push(current);

                EIGHT_WAY_DIRECTIONS.forEach((direction) => {
                    const nextRow = current.row + direction.row;
                    const nextCol = current.col + direction.col;
                    const key = `${nextRow}-${nextCol}`;

                    if (
                        nextRow < 0 ||
                        nextRow >= ROWS ||
                        nextCol < 0 ||
                        nextCol >= COLS ||
                        visited.has(key) ||
                        isLockedCorrectGem(nextRow, nextCol) ||
                        boardState[nextRow][nextCol] !== colorId
                    ) {
                        return;
                    }

                    visited.add(key);
                    queue.push({ row: nextRow, col: nextCol });
                });
            }

            return cluster;
        }

        function getConnectedTrayCluster(startIndex) {
            const colorId = trayState[startIndex];
            if (!colorId) return [];

            const visited = new Set([startIndex]);
            const cluster = [];
            const queue = [startIndex];
            let queueIndex = 0;

            while (queueIndex < queue.length) {
                const currentIndex = queue[queueIndex];
                queueIndex += 1;
                const currentPosition = getTrayPosition(currentIndex);
                cluster.push(currentIndex);

                EIGHT_WAY_DIRECTIONS.forEach((direction) => {
                    const nextRow = currentPosition.row + direction.row;
                    const nextCol = currentPosition.col + direction.col;

                    if (
                        nextRow < 0 ||
                        nextRow >= TRAY_ROW_COUNT ||
                        nextCol < 0 ||
                        nextCol >= TOP_POCKET_COUNT

                    const nextIndex = getTrayIndex(nextRow, nextCol);
                    if (visited.has(nextIndex) || trayState[nextIndex] !== colorId) {

        function getSettingSceneLayoutMetrics(contract) {
            const designWidth = contract?.viewport?.width || contract?.canvas?.width || 390;
            const designHeight = contract?.viewport?.height || contract?.canvas?.height || 844;
            const mountWidth = settingSceneMountElement?.clientWidth || designWidth;
            const mountHeight = settingSceneMountElement?.clientHeight || designHeight;
            const scale = Math.min(1, mountWidth / designWidth, mountHeight / designHeight);

            return {
                designWidth,
                designHeight,
                scale,
                scaledWidth: Math.ceil(designWidth * scale),
                scaledHeight: Math.ceil(designHeight * scale)
            };
        }

        function getSettingSceneContentBounds(contract) {
            const designWidth = contract?.viewport?.width || contract?.canvas?.width || 390;
            const designHeight = contract?.viewport?.height || contract?.canvas?.height || 844;
            const bounds = (contract?.layers || [])
                .map((layer) => {
                    const shape = layer?.visual?.model?.shape;
                    const left = Number(layer?.x ?? 0);
                    const top = Number(layer?.y ?? 0);
                    const width = Number(shape?.width ?? 0);
                    const height = Number(shape?.height ?? 0);

                    if (![left, top, width, height].every(Number.isFinite) || width <= 0 || height <= 0) {
                        return null;
                    }

                    return {
                        left,
                        top,
                        right: left + width,
                        bottom: top + height
                    };
                })
                .filter(Boolean);

            if (!bounds.length) {
                return {
                    left: 0,
                    top: 0,
                    right: designWidth,
                    bottom: designHeight,
                    width: designWidth,
                    height: designHeight
                };
            }

            const union = bounds.reduce(
                (acc, layerBounds) => ({
                    left: Math.min(acc.left, layerBounds.left),
                    top: Math.min(acc.top, layerBounds.top),
                    right: Math.max(acc.right, layerBounds.right),
                    bottom: Math.max(acc.bottom, layerBounds.bottom)
                }),
                {
                    left: designWidth,
                    top: designHeight,
                    right: 0,
                    bottom: 0
                }
            );

            return {
                ...union,
                width: Math.max(designWidth, union.right),
                height: Math.max(designHeight, union.bottom)
            };
        }

        function getSettingScenePanelBounds(contract) {
            const designWidth = contract?.viewport?.width || contract?.canvas?.width || 390;
            const designHeight = contract?.viewport?.height || contract?.canvas?.height || 844;
            const panelLayerIds = ["shape-rect-112", "shape-rect-113", "-111"];
            const panelBounds = panelLayerIds
                .map((stableId) => contract?.layers?.find((layer) => layer?.stableId === stableId))
                .filter(Boolean)
                .map((layer) => {
                    const shape = layer?.visual?.model?.shape;
                    const left = Number(layer?.x ?? 0);
                    const top = Number(layer?.y ?? 0);

            if (!panelBounds.length) {

            return panelBounds.reduce(

                    top: Math.min(bounds.top, layerBounds.top),
                    right: Math.max(bounds.right, layerBounds.right),

                    top: designHeight,
                    right: 0,
                    bottom: 0
                }
            );
        }

        function createSettingSceneSurface(contract) {
            if (!settingSceneMountElement) {
                return null;
            }

            const { designWidth, designHeight, scale, scaledWidth, scaledHeight } =
                getSettingSceneLayoutMetrics(contract);
            const contentBounds = getSettingSceneContentBounds(contract);
            const mountWidth = settingSceneMountElement?.clientWidth || designWidth;
            const scaledContentWidth = Math.ceil(contentBounds.width * scale);
            const exitDistance = Math.ceil(mountWidth * 0.5 + scaledContentWidth * 0.5 + 24);
            const shell = document.createElement("div");
            shell.className = "setting-scene-shell";
            shell.style.width = `${scaledWidth}px`;
            shell.style.height = `${scaledHeight}px`;
            shell.style.setProperty("--setting-scene-exit-distance", `${exitDistance}px`);

            const surface = document.createElement("div");
            surface.className = "setting-scene-surface";
            surface.style.width = `${contentBounds.width}px`;
            surface.style.height = `${contentBounds.height}px`;
            surface.style.transform = `scale(${scale})`;

            shell.appendChild(surface);

        function finalizeSettingSceneClear() {
            if (settingSceneCloseTimer) {
                window.clearTimeout(settingSceneCloseTimer);
                settingSceneCloseTimer = null;
            }

            if (settingSceneCloseAnimationCleanup) {
                settingSceneCloseAnimationCleanup();
                settingSceneCloseAnimationCleanup = null;
            }

            settingSceneUnsubscribers.forEach((off) => {
                try {
                    off?.();
                } catch (error) {
                    console.warn("[Setting] unsubscribe failed:", error);
                }
            });
            settingSceneUnsubscribers = [];

            if (settingSceneRenderer) {
                settingSceneRenderer.hide();
                settingSceneRenderer = null;
            }

            if (settingSceneMountElement) {
                settingSceneMountElement.replaceChildren();
                settingSceneMountElement.setAttribute("aria-hidden", "true");
            }

            if (settingOverlayElement) {
                settingOverlayElement.classList.remove("active");
                settingOverlayElement.classList.remove("closing");
                settingOverlayElement.setAttribute("aria-hidden", "true");
            }

            isSettingSceneOpen = false;
            isSettingSceneClosing = false;

            const afterCloseAction = settingSceneAfterCloseAction;
            settingSceneAfterCloseAction = null;
            if (typeof afterCloseAction === "function") {
                afterCloseAction();
            }
        }

        function clearSettingScene(options = {}) {
            const { immediate = false, afterClose = null } = options;
            if (typeof afterClose === "function") {
                settingSceneAfterCloseAction = afterClose;
            }

            if (immediate) {
                finalizeSettingSceneClear();
                return;
            }

            if (!isSettingSceneOpen || isSettingSceneClosing) {
                if (!isSettingSceneClosing) {
                    finalizeSettingSceneClear();
                }
                return;
            }

            settingSceneUnsubscribers.forEach((off) => {
                try {
                    off?.();
                } catch (error) {
                    console.warn("[Setting] unsubscribe failed:", error);
                }
            });
            settingSceneUnsubscribers = [];

            isSettingSceneOpen = false;
            isSettingSceneClosing = true;

            if (settingOverlayElement) {
                settingOverlayElement.classList.remove("active");
                settingOverlayElement.classList.add("closing");
                settingOverlayElement.setAttribute("aria-hidden", "false");
            }

            const shellElement = settingSceneMountElement?.querySelector(".setting-scene-shell");
            if (settingSceneCloseAnimationCleanup) {
                settingSceneCloseAnimationCleanup();
                settingSceneCloseAnimationCleanup = null;
            }

            if (shellElement) {
                const handleCloseAnimationEnd = (event) => {
                    if (event.target !== shellElement || event.animationName !== "setting-panel-exit") {
                        return;
                    }
                    finalizeSettingSceneClear();
                };

                shellElement.addEventListener("animationend", handleCloseAnimationEnd);
                settingSceneCloseAnimationCleanup = () => {
                    shellElement.removeEventListener("animationend", handleCloseAnimationEnd);
                };
            }

            if (settingSceneCloseTimer) {
                window.clearTimeout(settingSceneCloseTimer);
            }
            settingSceneCloseTimer = window.setTimeout(() => {
                finalizeSettingSceneClear();
            }, SETTING_SCENE_CLOSE_ANIMATION_MS);

                const handleClick = (event) => {
                    event.preventDefault();

                groupElement.addEventListener("click", handleClick);
                settingSceneUnsubscribers.push(() => {

        function registerSettingSceneStableIdToggleHandlers(stableIds, handler) {

                const element = settingSceneRenderer?.getElement?.(stableId);
                if (!element) {

                element.style.cursor = "pointer";
                element.setAttribute("role", "button");
                element.setAttribute("tabindex", "0");

                const handleClick = (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    handler();
                };

                const handleKeydown = (event) => {
                    if (event.key !== "Enter" && event.key !== " ") {
                        return;
                    }
                    event.preventDefault();
                    event.stopPropagation();
                    handler();
                };

                element.addEventListener("click", handleClick);
                element.addEventListener("keydown", handleKeydown);
                settingSceneUnsubscribers.push(() => {
                    element.removeEventListener("click", handleClick);
                    element.removeEventListener("keydown", handleKeydown);
                });
            });
        }

        async function showSettingScene() {
            if (!settingSceneMountElement || !settingOverlayElement || isSettingSceneOpen || isSettingSceneClosing) {
                return false;

            try {
                const [SceneRenderer, contract] = await Promise.all([
                    getSceneRendererCtor(),
                    getSettingContract()

                clearSettingScene({ immediate: true });

        function clearStageClearSceneEffects() {
            if (!stageClearSceneMountElement) {
                return;
            }

            const mountedNodes = [
                stageClearSceneMountElement,
                ...stageClearSceneMountElement.querySelectorAll("*")
            ];

            mountedNodes.forEach((node) => {
                if (node._confettiLoopId) {
                    window.clearInterval(node._confettiLoopId);
                    node._confettiLoopId = null;
                }

                if (node._confettiCleanupId) {
                    window.clearTimeout(node._confettiCleanupId);
                    node._confettiCleanupId = null;
                }
            });
        }

        function getStageClearSceneLayoutMetrics(contract) {
            const designWidth = contract?.viewport?.width || contract?.canvas?.width || 390;
            const designHeight = contract?.viewport?.height || contract?.canvas?.height || 844;
            const mountWidth = stageClearSceneMountElement?.clientWidth || designWidth;
            const mountHeight = stageClearSceneMountElement?.clientHeight || designHeight;
            const insetPadding = Math.max(12, Math.min(24, Math.floor(Math.min(mountWidth, mountHeight) * 0.04)));
            const availableWidth = Math.max(1, mountWidth - insetPadding * 2);
            const availableHeight = Math.max(1, mountHeight - insetPadding * 2);
            const scale = Math.min(1, availableWidth / designWidth, availableHeight / designHeight);

            return {
                designWidth,
                designHeight,
                scale,
                scaledWidth: Math.round(designWidth * scale),
                scaledHeight: Math.round(designHeight * scale)
            };
        }

        function createStageClearSceneSurface(contract) {
            if (!stageClearSceneMountElement) {
                return null;
            }

            const { designWidth, designHeight, scale, scaledWidth, scaledHeight } =
                getStageClearSceneLayoutMetrics(contract);
            const shell = document.createElement("div");
            shell.className = "stage-clear-scene-shell";
            shell.style.width = `${scaledWidth}px`;
            shell.style.height = `${scaledHeight}px`;

            const surface = document.createElement("div");
            surface.className = "stage-clear-scene-surface";
            surface.style.width = `${designWidth}px`;
            surface.style.height = `${designHeight}px`;
            surface.style.transform = `scale(${scale})`;

            shell.appendChild(surface);
            stageClearSceneMountElement.appendChild(shell);
            return surface;
        }

        function advanceToNextStage(sessionVersion = gameSessionVersion) {

        function startStageClearSequence(sessionVersion = gameSessionVersion) {
            if (!isCurrentGameSession(sessionVersion)) {

        function triggerSolvedStageSequence(sessionVersion = gameSessionVersion) {
            clearCelebrationTimers();
            clearSolvedStageFailSafeTimer();
            clearPersistedGameProgress();
            clearRuntimeSnapshot();
            const stageClearDelay = scheduleFullBoardCelebration();
            const stageClearTimer = window.setTimeout(() => {
                startStageClearSequence(sessionVersion);
            }, stageClearDelay);
            stageClearTimers.push(stageClearTimer);
            solvedStageFailSafeTimer = window.setTimeout(() => {
                if (!isCurrentGameSession(sessionVersion) || !solved) {

        function clearCurrentStageFromPixelAdmin() {
            if (!ACTIVE_MAP) {
                return;
            }

            if (isAnimating || isStageTransitioning) {
                pixelAdminState.message = "이동이나 전환이 끝난 뒤에 스테이지 클리어를 눌러 주세요.";
                renderPixelAdmin();
                return;

            clearSparkles();
            clearCelebrationTimers();
            clearSolvedStageFailSafeTimer();
            clearStageClearTimers();
            boardState = clonePixelMap(TARGET_MAP);
            trayState = Array.from({ length: POCKET_SIZE }, () => 0);
            cleanedSocketCells = new Set();
            actionOverlayState = null;
            selected = null;
            completedColorIds = getCompletedColorIds();
            solved = checkSolved();
            setStatus("현재 스테이지를 즉시 클리어했어요.");
            render();
